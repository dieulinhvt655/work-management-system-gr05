spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

jwt.secret=test-jwt-secret-key-minimum-32-characters-long
jwt.expiration=3600000
jwt.refresh-expiration=86400000
jwt.reset-expiration=900000

app.frontend-base-url=http://localhost:5173
app.attachment.upload-dir=${java.io.tmpdir}/wms-integration-test-uploads

spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=test@local
spring.mail.password=test

logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN

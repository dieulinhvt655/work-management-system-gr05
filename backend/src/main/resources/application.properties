spring.application.name=backend

server.port=8080

jwt.secret=work-management-system-jwt-secret-key-change-in-production-min-32-chars
jwt.expiration=604800000
jwt.refresh-expiration=2592000000
jwt.reset-expiration=900000

spring.datasource.url=jdbc:mysql://localhost:3306/work_management_system?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Swagger / OpenAPI (springdoc auto-scans @RestController)
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# Frontend (link khôi phục mật khẩu trong email)
app.frontend-base-url=http://localhost:5173

